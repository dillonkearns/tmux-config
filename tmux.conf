# =============================================================================
# Tmux config — optimized for e-ink tablet (BOOX Note Air 5 C)
# =============================================================================

# ---------------------------------------------------------------------------
# Core settings
# ---------------------------------------------------------------------------

# Prefix: C-Space (ergonomic, doesn't conflict with Emacs C-a/C-e)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color and terminal settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Large scrollback
set -g history-limit 50000

# Mouse support (useful for occasional touch interaction on tablet)
set -g mouse on

# Reduce escape delay (faster key response)
set -sg escape-time 10

# Start numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer display time for messages
set -g display-time 2000
set -g display-panes-time 2000

# Focus events off — causes Claude Code to re-render entire conversation on session switch
set -g focus-events off

# vi mode for copy
setw -g mode-keys vi

# ---------------------------------------------------------------------------
# Theme — adapts to terminal palette
# ---------------------------------------------------------------------------
# Uses "default" and ANSI palette colors so each terminal controls the look:
#   - Warp (MacBook): set to your preferred dark theme
#   - Termux (BOOX): set to a high-contrast light theme for e-ink
# tmux sends the same color codes; each terminal renders its own palette.

# Status bar position
set -g status-position bottom
set -g status-justify left

# Status bar colors — ANSI palette colours (terminal theme controls the look)
set -g status-style "bg=colour0,fg=colour7"

# Left status: session name
set -g status-left-length 30
set -g status-left " #[bold]#S#[nobold] | "

# Right status: session status icons + time
set -g status-right-length 80
set -g status-right "#(~/src/github.com/dillonkearns/tmux-config/scripts/statusbar-sessions.sh) │ %H:%M "

# Window list styling
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold,reverse] #I:#W #[default]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4,bold"

# Message styling — reverse video (works in both light and dark)
set -g message-style "reverse,bold"
set -g message-command-style "reverse"

# Copy mode styling
setw -g mode-style "reverse"

# Clock
setw -g clock-mode-colour default

# Status bar update interval (longer = fewer redraws for e-ink)
set -g status-interval 30

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Intuitive splits (and open in same directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation with arrow keys
bind Up select-pane -U
bind Down select-pane -D
bind Left select-pane -L
bind Right select-pane -R

# Session switching
bind j switch-client -n  # Next session
bind k switch-client -p  # Previous session
bind L switch-client -l  # Last session

# ---------------------------------------------------------------------------
# sesh — session manager (replaces project-switcher and session-picker)
# ---------------------------------------------------------------------------

# Prefix + f: sesh connect via fzf popup
# C-a = all, C-t = tmux, C-x = zoxide, C-f = find repos, C-d = kill session
bind f run-shell "sesh connect \"$(
  sesh list | fzf-tmux -p 80%,70% \
    --no-sort --ansi \
    --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all  ^t tmux  ^x zoxide  ^f find  ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
    --bind 'ctrl-x:change-prompt(📂  )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(find ~/src/github.com/dillonkearns -mindepth 1 -maxdepth 1 -type d)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+reload(sesh list)' \
    --preview 'sesh preview {}'
)\""

# Prefix + s: same as f (easy to remember either way)
bind s run-shell "sesh connect \"$(
  sesh list | fzf-tmux -p 80%,70% \
    --no-sort --ansi \
    --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all  ^t tmux  ^x zoxide  ^f find  ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
    --bind 'ctrl-x:change-prompt(📂  )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(find ~/src/github.com/dillonkearns -mindepth 1 -maxdepth 1 -type d)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+reload(sesh list)' \
    --preview 'sesh preview {}'
)\""

# ---------------------------------------------------------------------------
# Git diff popup
# ---------------------------------------------------------------------------

# Prefix + g: open lazygit in a popup (q to close)
# Uses -d to set the popup's working directory directly
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Prefix + h: GitHub status popup (CI, PR, working tree)
bind h display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "~/src/github.com/dillonkearns/tmux-config/scripts/gh-status.sh"

# Prefix + Space: Claude Code dashboard (status across all sessions)
# Also kept on Prefix + D as fallback
bind Space run-shell "tmux neww '~/src/github.com/dillonkearns/tmux-config/scripts/claude-dashboard.sh'"
bind D run-shell "tmux neww '~/src/github.com/dillonkearns/tmux-config/scripts/claude-dashboard.sh'"

# ---------------------------------------------------------------------------
# Copy mode improvements
# ---------------------------------------------------------------------------

# Enter copy mode
bind [ copy-mode

# vi-style selection and copy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Quality of life
# ---------------------------------------------------------------------------

# Don't rename windows automatically (we name them deliberately)
setw -g automatic-rename off
setw -g allow-rename off

# Activity monitoring (subtle, no visual bell)
setw -g monitor-activity on
set -g visual-activity off

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------

# tmux-resurrect: save/restore sessions across restarts
# Prefix + C-s to save, Prefix + C-r to restore
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux

# tmux-continuum: auto-save every 15 minutes
set -g @continuum-save-interval '15'
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
