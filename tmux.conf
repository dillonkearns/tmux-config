# =============================================================================
# Tmux config — optimized for e-ink tablet (BOOX Note Air 5 C)
# =============================================================================

# ---------------------------------------------------------------------------
# Core settings
# ---------------------------------------------------------------------------

# Prefix: C-Space (ergonomic, doesn't conflict with Emacs C-a/C-e)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color and terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Enable hyperlink support (OSC 8) passthrough
set -ga terminal-features ",*:hyperlinks"

# Large scrollback
set -g history-limit 50000

# Mouse support (useful for occasional touch interaction on tablet)
set -g mouse on

# Reduce escape delay (faster key response)
set -sg escape-time 10

# Pass through extended key sequences (Shift+Enter, etc.) to applications
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features ',*:extkeys'

# Start numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer display time for messages
set -g display-time 2000
set -g display-panes-time 2000

# Focus events off — causes Claude Code to re-render entire conversation on session switch
set -g focus-events off

# vi mode for copy
setw -g mode-keys vi

# OSC 52 clipboard — allows copying to work over SSH
set -g set-clipboard on
set -g allow-passthrough on

# ---------------------------------------------------------------------------
# Theme — adapts to terminal palette
# ---------------------------------------------------------------------------
# Uses "default" and ANSI palette colors so each terminal controls the look:
#   - Warp (MacBook): set to your preferred dark theme
#   - Termux (BOOX): set to a high-contrast light theme for e-ink
# tmux sends the same color codes; each terminal renders its own palette.

# Status bar position
set -g status-position bottom
set -g status-justify left

# Status bar colors — ANSI palette colours (terminal theme controls the look)
set -g status-style "bg=colour0,fg=colour7"

# Left status: session name
set -g status-left-length 30
set -g status-left " #[bold]#S#[nobold] | "

# Right status: session status icons + time
set -g status-right-length 80
set -g status-right "#(~/src/github.com/dillonkearns/tmux-config/scripts/statusbar-sessions.sh) │ %H:%M "

# Window list styling
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold,reverse] #I:#W #[default]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4,bold"

# Message styling — reverse video (works in both light and dark)
set -g message-style "reverse,bold"
set -g message-command-style "reverse"

# Copy mode styling
setw -g mode-style "reverse"

# Clock
setw -g clock-mode-colour default

# Status bar update interval (longer = fewer redraws for e-ink)
set -g status-interval 30

# Refresh status bar immediately on session switch
set-hook -g client-session-changed "refresh-client -S"

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Intuitive splits (and open in same directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation with arrow keys
bind Up select-pane -U
bind Down select-pane -D
bind Left select-pane -L
bind Right select-pane -R

# Session switching
bind j switch-client -n  # Next session
bind k switch-client -p  # Previous session
bind L switch-client -l  # Last session

# Prefix + 1-9: jump to session by number (matches status bar/dashboard numbering)
bind 1 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 1'
bind 2 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 2'
bind 3 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 3'
bind 4 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 4'
bind 5 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 5'
bind 6 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 6'
bind 7 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 7'
bind 8 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 8'
bind 9 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/switch-session.sh 9'
bind X confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n \; kill-session -t \"#S\"'"

# ---------------------------------------------------------------------------
# sesh — session manager (replaces project-switcher and session-picker)
# ---------------------------------------------------------------------------

# Prefix + f / s: sesh connect via fzf popup
# C-t = tmux sessions, C-f = find repos, C-d = kill session
bind f run-shell "sesh connect -c 'claude --dangerously-skip-permissions' \"$(
  ls -d ~/src/github.com/dillonkearns/*/ | sed 's:/$::' | fzf-tmux -p 80%,70% \
    --no-sort --ansi \
    --border-label ' sesh ' --prompt '🔎  ' \
    --header '  ^t tmux only  ^f all repos  ^d kill session' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-t:change-prompt(⚡  )+reload(sesh list -t)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(ls -d ~/src/github.com/dillonkearns/*/ | sed s:/$::)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+reload(sesh list -t)' \
    --preview 'sesh preview {}'
)\""

bind s run-shell "sesh connect -c 'claude --dangerously-skip-permissions' \"$(
  ls -d ~/src/github.com/dillonkearns/*/ | sed 's:/$::' | fzf-tmux -p 80%,70% \
    --no-sort --ansi \
    --border-label ' sesh ' --prompt '🔎  ' \
    --header '  ^t tmux only  ^f all repos  ^d kill session' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-t:change-prompt(⚡  )+reload(sesh list -t)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(ls -d ~/src/github.com/dillonkearns/*/ | sed s:/$::)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+reload(sesh list -t)' \
    --preview 'sesh preview {}'
)\""

# ---------------------------------------------------------------------------
# Git diff popup
# ---------------------------------------------------------------------------

# Prefix + g: open lazygit in a popup (q to close)
# Uses -d to set the popup's working directory directly
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Prefix + e: open elm-docs in a popup (q to close)
bind e display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "elm-docs"

# Prefix + b: btop system monitor in a popup
bind b display-popup -w 90% -h 90% -E "btop"

# Prefix + m: browse markdown files with glow
bind m display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "glow -p"

# Prefix + h: GitHub status popup (CI, PR, working tree)
bind h display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "~/src/github.com/dillonkearns/tmux-config/scripts/gh-status.sh"

# Prefix + 0: jump to/from supervisor session (always available)
bind 0 run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/supervisor.sh'

# Prefix + T: toggle between custom and opensessions dashboard modes
bind T run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/toggle-dashboard-mode.sh'

# ---------------------------------------------------------------------------
# Dashboard mode: custom (default) — our hand-rolled dashboard + status bar
# ---------------------------------------------------------------------------
# Prefix + o: supervisor toggle (only in custom mode, opensessions uses prefix o)
if-shell '[ "$(cat ~/.tmux-dashboard-mode 2>/dev/null)" != "opensessions" ]' {
  bind o run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/supervisor.sh'
  bind Space run-shell "tmux neww '~/src/github.com/dillonkearns/tmux-config/scripts/claude-dashboard.sh'"
  bind D run-shell "tmux neww '~/src/github.com/dillonkearns/tmux-config/scripts/claude-dashboard.sh'"
  # Clean up opensessions root-table bindings when switching back to custom mode
  unbind -n M-e
  unbind -n M-o
  unbind -n M-1
  unbind -n M-2
  unbind -n M-3
  unbind -n M-4
  unbind -n M-5
  unbind -n M-6
  unbind -n M-7
  unbind -n M-8
  unbind -n M-9
}

# ---------------------------------------------------------------------------
# Dashboard mode: opensessions — sidebar with live agent status
# ---------------------------------------------------------------------------
if-shell '[ "$(cat ~/.tmux-dashboard-mode 2>/dev/null)" = "opensessions" ]' {
  # opensessions registers prefix o → s/t/1-9, so we don't bind o here
  # Remap supervisor to prefix O (capital) in opensessions mode
  bind O run-shell '~/src/github.com/dillonkearns/tmux-config/scripts/supervisor.sh'
  # Keep Space/D for custom dashboard even in opensessions mode (complementary)
  bind Space run-shell "tmux neww '~/src/github.com/dillonkearns/tmux-config/scripts/claude-dashboard.sh'"
  bind D run-shell "tmux neww '~/src/github.com/dillonkearns/tmux-config/scripts/claude-dashboard.sh'"

  # Root-table bindings for Ghostty native shortcuts (no prefix needed).
  # C-Space prefix = \x00 (NUL) which Ghostty text: can't send, so we
  # use M-key (ESC+char) root bindings instead. With escape-time 10ms,
  # only programmatic input (Ghostty text:) triggers these — not human
  # typing ESC then a letter.
  bind -n M-e run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/toggle.sh"
  bind -n M-o run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/focus.sh"

  # Session switching: opensessions @opensessions-index-keys creates these,
  # but we set them explicitly so they're cleaned up on mode switch.
  bind -n M-1 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 1"
  bind -n M-2 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 2"
  bind -n M-3 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 3"
  bind -n M-4 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 4"
  bind -n M-5 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 5"
  bind -n M-6 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 6"
  bind -n M-7 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 7"
  bind -n M-8 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 8"
  bind -n M-9 run-shell "sh ~/.tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 9"
}

# ---------------------------------------------------------------------------
# Copy mode improvements
# ---------------------------------------------------------------------------

# Enter copy mode
bind [ copy-mode

# vi-style selection and copy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Quality of life
# ---------------------------------------------------------------------------

# Don't rename windows automatically (we name them deliberately)
setw -g automatic-rename off
setw -g allow-rename off

# Activity monitoring (subtle, no visual bell)
setw -g monitor-activity on
set -g visual-activity off

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------

# tmux-resurrect: save/restore sessions across restarts
# Prefix + C-s to save, Prefix + C-r to restore
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux

# tmux-continuum: auto-save every 15 minutes
set -g @continuum-save-interval '15'
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux

# tmux-fingers: hint-based text grabbing (Prefix + F)
set -g @fingers-key F
run-shell ~/.tmux/plugins/tmux-fingers/tmux-fingers.tmux

# extrakto: fuzzy-find any text on screen (Prefix + Tab)
# Tab = insert into command line, Enter = copy to clipboard
set -g @extrakto_key Tab
set -g @extrakto_split_size 12
set -g @extrakto_grab_area recent
set -g @extrakto_filter_order "line word"
run-shell ~/.tmux/plugins/extrakto/extrakto.tmux

# opensessions: sidebar with live agent status (only when opted in)
if-shell '[ "$(cat ~/.tmux-dashboard-mode 2>/dev/null)" = "opensessions" ]' {
  set -g @plugin 'Ataraxy-Labs/opensessions'
}

# ---------------------------------------------------------------------------
# TPM — must be the very last line
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
